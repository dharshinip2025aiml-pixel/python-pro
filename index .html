
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CineMood – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.14);
    --text: #f0eee8;
    --muted: #6e6c80;
    --accent: #e85a2a;
    --accent2: #f0a040;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── Cinematic background ── */
  .bg-layer {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(232,90,42,0.10) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(91,155,213,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 60% 20%, rgba(240,160,64,0.05) 0%, transparent 60%);
  }

  /* Film strip left */
  .filmstrip {
    position: fixed; left: 0; top: 0; bottom: 0; width: 48px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 0; gap: 0; z-index: 1; overflow: hidden;
  }
  .filmstrip::before, .filmstrip::after {
    content: '';
    position: absolute; left: 8px; right: 8px;
    top: 0; bottom: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 14px,
      var(--bg3) 14px,
      var(--bg3) 22px
    );
    opacity: 0.5;
    animation: filmroll 6s linear infinite;
  }

  /* Film strip right */
  .filmstrip-r {
    position: fixed; right: 0; top: 0; bottom: 0; width: 48px;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center;
    z-index: 1; overflow: hidden;
  }
  .filmstrip-r::before {
    content: '';
    position: absolute; left: 8px; right: 8px; top: 0; bottom: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 14px,
      var(--bg3) 14px,
      var(--bg3) 22px
    );
    opacity: 0.5;
    animation: filmroll 6s linear infinite reverse;
  }
  @keyframes filmroll { from { background-position: 0 0; } to { background-position: 0 360px; } }

  /* Floating movie emojis */
  .floaters {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  }
  .floater {
    position: absolute;
    font-size: 22px;
    opacity: 0.07;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    from { transform: translateY(100vh) rotate(0deg); opacity: 0.07; }
    to   { transform: translateY(-120px) rotate(20deg); opacity: 0; }
  }

  /* ── Card ── */
  .card {
    position: relative; z-index: 10;
    width: 100%; max-width: 420px;
    background: rgba(18,18,26,0.85);
    border: 1px solid var(--border2);
    border-radius: 24px;
    padding: 44px 40px 40px;
    backdrop-filter: blur(24px);
    box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 0.5px rgba(255,255,255,0.04) inset;
    animation: cardIn .5s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Logo */
  .logo {
    text-align: center; margin-bottom: 32px;
  }
  .logo-icon {
    font-size: 48px; display: block; margin-bottom: 10px;
    animation: iconPop .6s cubic-bezier(.34,1.56,.64,1) .2s both;
  }
  @keyframes iconPop { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .logo h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 28px;
    letter-spacing: -0.03em;
    color: var(--text);
  }
  .logo h1 span { color: var(--accent); }
  .logo p {
    font-size: 13px; color: var(--muted); margin-top: 5px;
    font-style: italic; font-weight: 300;
  }

  /* Tabs (Login / Signup) */
  .auth-tabs {
    display: flex; background: var(--bg3); border-radius: 12px;
    padding: 4px; margin-bottom: 28px; border: 1px solid var(--border);
  }
  .auth-tab {
    flex: 1; text-align: center; padding: 9px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    border-radius: 9px; cursor: pointer; border: none; background: none;
    color: var(--muted); transition: all .2s;
  }
  .auth-tab.active {
    background: var(--bg2); color: var(--text);
    border: 1px solid var(--border2);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  /* Form */
  .form-group { margin-bottom: 16px; }
  label {
    display: block; font-size: 12px; font-weight: 500;
    color: var(--muted); margin-bottom: 7px; letter-spacing: .03em;
    text-transform: uppercase;
  }
  .input-wrap { position: relative; }
  .input-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-size: 15px; pointer-events: none;
  }
  input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 11px;
    padding: 13px 14px 13px 42px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    transition: border-color .2s, box-shadow .2s;
    outline: none;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(232,90,42,0.12);
  }
  input::placeholder { color: var(--muted); }

  /* Remember me */
  .remember-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 22px; margin-top: -4px;
  }
  .remember-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--muted); cursor: pointer;
  }
  .remember-label input[type=checkbox] {
    width: 15px; height: 15px; padding: 0;
    accent-color: var(--accent); cursor: pointer;
  }
  .forgot { font-size: 12px; color: var(--muted); cursor: pointer; transition: color .2s; text-decoration: none; }
  .forgot:hover { color: var(--accent); }

  /* Submit button */
  .submit-btn {
    width: 100%; padding: 14px;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
    letter-spacing: .01em;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: white; border: none; border-radius: 12px; cursor: pointer;
    transition: all .2s;
    box-shadow: 0 4px 20px rgba(232,90,42,0.3);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(232,90,42,0.4); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn.loading { opacity: .7; pointer-events: none; }

  /* Divider */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 22px 0; color: var(--muted); font-size: 12px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border2);
  }

  /* Social */
  .social-row { display: flex; gap: 10px; }
  .social-btn {
    flex: 1; padding: 11px; border-radius: 10px;
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); font-size: 13px; font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all .18s;
  }
  .social-btn:hover { background: #1e1e2e; border-color: var(--border2); transform: translateY(-1px); }

  /* Error / success */
  .alert {
    border-radius: 10px; padding: 11px 14px;
    font-size: 13px; margin-bottom: 18px; display: none;
    animation: alertIn .25s ease both;
  }
  @keyframes alertIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: translateY(0); } }
  .alert-error { background: rgba(229,53,53,0.1); border: 1px solid rgba(229,53,53,0.2); color: #f08080; }
  .alert-success { background: rgba(62,201,142,0.1); border: 1px solid rgba(62,201,142,0.2); color: #3ec98e; }

  /* Switch text */
  .switch-text {
    text-align: center; margin-top: 22px;
    font-size: 13px; color: var(--muted);
  }
  .switch-text a { color: var(--accent); cursor: pointer; font-weight: 500; text-decoration: none; transition: color .2s; }
  .switch-text a:hover { color: var(--accent2); }

  /* Name field (signup only) */
  #name-group { display: none; }
  #name-group.visible { display: block; }

  /* Panel switching animation */
  .form-panel { animation: fadeIn .3s ease both; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
</style>
</head>
<body>

<!-- Background layers -->
<div class="bg-layer"></div>
<div class="floaters" id="floaters"></div>
<div class="filmstrip"></div>
<div class="filmstrip-r"></div>

<!-- Card -->
<div class="card">
  <div class="logo">
    <span class="logo-icon">🎬</span>
    <h1>Cine<span>Mood</span></h1>
    <p>Tamil Movies for Every Mood</p>
  </div>

  <!-- Tabs -->
  <div class="auth-tabs">
    <button class="auth-tab active" id="tab-login" onclick="switchMode('login')">Login</button>
    <button class="auth-tab" id="tab-signup" onclick="switchMode('signup')">Sign Up</button>
  </div>

  <!-- Alert -->
  <div class="alert alert-error" id="alert-error"></div>
  <div class="alert alert-success" id="alert-success"></div>

  <!-- Form -->
  <div class="form-panel" id="form-panel">

    <!-- Name (signup only) -->
    <div class="form-group" id="name-group">
      <label>Full Name</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input type="text" id="input-name" placeholder="Your name" autocomplete="name"/>
      </div>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <span class="input-icon">✉️</span>
        <input type="email" id="input-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="input-password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
    </div>

    <!-- Remember / Forgot (login only) -->
    <div class="remember-row" id="remember-row">
      <label class="remember-label">
        <input type="checkbox" id="remember"/> Remember me
      </label>
      <a class="forgot" onclick="showForgot()">Forgot password?</a>
    </div>

    <!-- Submit -->
    <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">
      <span id="btn-text">🎬 Login</span>
    </button>

    <!-- Divider -->
    <div class="divider">or continue with</div>

    <!-- Social -->
    <div class="social-row">
      <button class="social-btn" onclick="socialLogin('Google')">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#EA4335" d="M5.266 9.765A7.077 7.077 0 0 1 12 4.909c1.69 0 3.218.6 4.418 1.582L19.91 3C17.782 1.145 15.055 0 12 0 7.27 0 3.198 2.698 1.24 6.65l4.026 3.115Z"/><path fill="#34A853" d="M16.04 18.013c-1.09.703-2.474 1.078-4.04 1.078a7.077 7.077 0 0 1-6.723-4.823l-4.04 3.067A11.965 11.965 0 0 0 12 24c2.933 0 5.735-1.043 7.834-3l-3.793-2.987Z"/><path fill="#4A90E2" d="M19.834 21c2.195-2.048 3.62-5.096 3.62-9 0-.71-.109-1.473-.272-2.182H12v4.637h6.436c-.317 1.559-1.17 2.766-2.395 3.558L19.834 21Z"/><path fill="#FBBC05" d="M5.277 14.268A7.12 7.12 0 0 1 4.909 12c0-.782.125-1.533.357-2.235L1.24 6.65A11.934 11.934 0 0 0 0 12c0 1.92.445 3.73 1.237 5.335l4.04-3.067Z"/></svg>
        Google
      </button>
      <button class="social-btn" onclick="socialLogin('GitHub')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12Z"/></svg>
        GitHub
      </button>
    </div>

    <div class="switch-text" id="switch-text">
      Don't have an account? <a onclick="switchMode('signup')">Sign up free</a>
    </div>
  </div>
</div>

<script>
  let mode = 'login';

  function switchMode(m) {
    mode = m;
    clearAlerts();

    document.getElementById('tab-login').classList.toggle('active', m === 'login');
    document.getElementById('tab-signup').classList.toggle('active', m === 'signup');

    const nameGroup = document.getElementById('name-group');
    const rememberRow = document.getElementById('remember-row');
    const btnText = document.getElementById('btn-text');
    const switchText = document.getElementById('switch-text');

    if (m === 'signup') {
      nameGroup.classList.add('visible');
      rememberRow.style.display = 'none';
      btnText.textContent = '✨ Create Account';
      switchText.innerHTML = 'Already have an account? <a onclick="switchMode(\'login\')">Login</a>';
    } else {
      nameGroup.classList.remove('visible');
      rememberRow.style.display = '';
      btnText.textContent = '🎬 Login';
      switchText.innerHTML = 'Don\'t have an account? <a onclick="switchMode(\'signup\')">Sign up free</a>';
    }

    // Refresh animation
    const panel = document.getElementById('form-panel');
    panel.style.animation = 'none';
    requestAnimationFrame(() => { panel.style.animation = ''; });
  }

  async function handleSubmit() {
    clearAlerts();
    const email = document.getElementById('input-email').value.trim();
    const password = document.getElementById('input-password').value;
    const name = document.getElementById('input-name').value.trim();

    if (!email || !password) { showError('Please fill in all fields.'); return; }
    if (mode === 'signup' && !name) { showError('Please enter your name.'); return; }
    if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }

    const btn = document.getElementById('submit-btn');
    btn.classList.add('loading');
    document.getElementById('btn-text').textContent = '⏳ Please wait...';

    // Simulate API call
    await delay(1200);

    btn.classList.remove('loading');

    if (mode === 'login') {
      // Demo: any valid-looking credentials succeed
      if (email.includes('@') && password.length >= 6) {
        showSuccess('✓ Login successful! Redirecting to dashboard...');
        document.getElementById('btn-text').textContent = '🎬 Login';
        setTimeout(() => {
          showSuccess('Welcome back! (In the real app, you\'d be redirected to /dashboard)');
        }, 1500);
      } else {
        showError('Invalid email or password. Please try again.');
        document.getElementById('btn-text').textContent = '🎬 Login';
      }
    } else {
      showSuccess('✓ Account created! Welcome to CineMood.');
      document.getElementById('btn-text').textContent = '✨ Create Account';
      setTimeout(() => switchMode('login'), 2000);
    }
  }

  function socialLogin(provider) {
    showSuccess(`Connecting to ${provider}... (Demo mode)`);
  }

  function showForgot() {
    showSuccess('Password reset link sent! Check your inbox.');
  }

  function showError(msg) {
    const el = document.getElementById('alert-error');
    el.textContent = msg; el.style.display = 'block';
  }
  function showSuccess(msg) {
    const el = document.getElementById('alert-success');
    el.textContent = msg; el.style.display = 'block';
  }
  function clearAlerts() {
    document.getElementById('alert-error').style.display = 'none';
    document.getElementById('alert-success').style.display = 'none';
  }

  function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

  // Floating emojis
  const emojis = ['🎬','🍿','🎭','🎞️','⭐','🎥','🏆','💕','😄','😢','💥','😱'];
  const container = document.getElementById('floaters');
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'floater';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (12 + Math.random() * 16) + 's';
    el.style.animationDelay = (Math.random() * 14) + 's';
    el.style.fontSize = (16 + Math.random() * 14) + 'px';
    container.appendChild(el);
  }
</script>
</body>
</html>
